version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tiendeo-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: tiendeo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - tiendeo-network

  redis:
    image: redis:7-alpine
    container_name: tiendeo-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - tiendeo-network

  minio:
    image: minio/minio
    container_name: tiendeo-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - tiendeo-network

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  tiendeo-network:
    driver: bridge
