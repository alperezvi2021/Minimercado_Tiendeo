version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-tiendeo}-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: tiendeo
    # Se eliminan los 'ports' para no chocar con el Postgres de Chatwoot (5432)
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - tiendeo-network

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-tiendeo}-redis
    # Se eliminan los 'ports' para no chocar con el Redis de Chatwoot (6379)
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - tiendeo-network

  minio:
    image: minio/minio
    container_name: ${COMPOSE_PROJECT_NAME:-tiendeo}-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - tiendeo-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-tiendeo}-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3051}:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/tiendeo?schema=public
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password123
      - DB_NAME=tiendeo
      - JWT_SECRET=supersalariosecreto99
      - PORT=3001
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis
      - minio
    networks:
      - tiendeo-network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://tiendeopos.grupodksoluciones.com/api}
    container_name: ${COMPOSE_PROJECT_NAME:-tiendeo}-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3050}:3000"

    depends_on:
      - backend
    networks:
      - tiendeo-network

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  tiendeo-network:
    driver: bridge
